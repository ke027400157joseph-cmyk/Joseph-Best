<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Pet Care</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo"><span class="logo-icon">🐾</span> Pet Care</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Service</a></li>
                <li><a href="price.html">Price</a></li>
                <li><a href="booking.html" class="active">Booking</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="booking.html" class="get-quote-btn">Get Quote</a>
            <div class="mobile-menu" id="mobileMenu"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <section class="page-header">
        <div class="header-content">
            <h1>Book Appointment</h1>
            <p>Home > Booking</p>
        </div>
    </section>

    <section class="booking-section" style="padding: 5rem 5%; background: white;">
        <div class="container" style="max-width: 600px; margin: 0 auto;">
            <div class="section-title">
                <h4 class="sub-heading">Reservation</h4>
                <h2>Schedule Your Visit</h2>
            </div>
            <form id="bookingForm" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" placeholder="Your Name" required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;">
                <input type="email" placeholder="Your Email" required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;">
                <input type="tel" placeholder="Phone Number" required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;">
                <select required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;">
                    <option value="">Select Service</option>
                    <option value="grooming">Grooming</option>
                    <option value="vet">Veterinary</option>
                    <option value="training">Training</option>
                    <option value="boarding">Boarding</option>
                </select>
                <input type="date" required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;">
                <textarea placeholder="Additional Notes" rows="4" style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;"></textarea>
                <button type="submit" class="btn-book" style="border: none; cursor: pointer; width: 100%;">Confirm Booking</button>
            </form>
        </div>
    </section>

    <footer><div class="footer-bottom"><p>&copy; 2024 Pet Care. All rights reserved.</p></div></footer>
    <script src="script.js"></script>
</body>
</html>
