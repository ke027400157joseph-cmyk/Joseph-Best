<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Pet Care</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo"><span class="logo-icon">🐾</span> Pet Care</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Service</a></li>
                <li><a href="price.html">Price</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <a href="booking.html" class="get-quote-btn">Get Quote</a>
            <div class="mobile-menu" id="mobileMenu"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <section class="page-header">
        <div class="header-content">
            <h1>Contact Us</h1>
            <p>Home > Contact</p>
        </div>
    </section>

    <section class="contact-section" style="padding: 5rem 5%; background: #f8f9fa;">
        <div class="container">
            <div class="section-title">
                <h4 class="sub-heading">Get In Touch</h4>
                <h2>We'd Love to Hear From You</h2>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; max-width: 1200px; margin: 0 auto;">
                <!-- Contact Info -->
                <div class="contact-info">
                    <div class="contact-item" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                        <span style="font-size: 2rem; color: #ff6b35;">📍</span>
                        <div>
                            <h4 style="color: #1a1a1a; margin-bottom: 0.5rem;">Location</h4>
                            <p style="color: #666;">233 Adams, Paris, France</p>
                        </div>
                    </div>
                    <div class="contact-item" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                        <span style="font-size: 2rem; color: #ff6b35;">📞</span>
                        <div>
                            <h4 style="color: #1a1a1a; margin-bottom: 0.5rem;">Phone</h4>
                            <p style="color: #666;">+1 (234) 567-890</p>
                        </div>
                    </div>
                    <div class="contact-item" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                        <span style="font-size: 2rem; color: #ff6b35;">✉️</span>
                        <div>
                            <h4 style="color: #1a1a1a; margin-bottom: 0.5rem;">Email</h4>
                            <p style="color: #666;">info@petcare.com</p>
                        </div>
                    </div>
                </div>
                <!-- Contact Form -->
                <form id="contactForm" style="display: flex; flex-direction: column; gap: 1rem; background: white; padding: 2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                    <input type="text" placeholder="Your Name" required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;">
                    <input type="email" placeholder="Your Email" required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;">
                    <input type="text" placeholder="Subject" required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;">
                    <textarea placeholder="Message" rows="5" required style="padding: 1rem; border: 1px solid #ddd; border-radius: 0;"></textarea>
                    <button type="submit" class="btn-book" style="border: none; cursor: pointer;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer><div class="footer-bottom"><p>&copy; 2024 Pet Care. All rights reserved.</p></div></footer>
    <script src="script.js"></script>
</body>
</html>
